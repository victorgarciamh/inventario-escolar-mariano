{% extends 'base.html' %}
{% block topbar_title %}Agregar artículo{% endblock %}
{% block content %}

<div class="page-header">
    <div>
        <h2>Agregar artículo</h2>
        <p>Registra un nuevo elemento en el inventario</p>
    </div>
    <a href="{{ url_for('inventario.lista_articulos') }}" class="btn btn-ghost">
        <i class="bi bi-arrow-left"></i> Volver
    </a>
</div>

<div class="card" style="max-width:720px;">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">Nombre *</label>
                    <input type="text" name="nombre" class="form-control" placeholder="Ej: Silla de madera" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Categoría</label>
                    <input type="text" name="categoria" class="form-control" placeholder="Ej: Mobiliario, Electrónico...">
                </div>
                <div class="form-group">
                    <label class="form-label">Cantidad *</label>
                    <input type="number" name="cantidad" class="form-control" value="1" min="1" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Estado</label>
                    <select name="estado" class="form-select">
                        <option value="Bueno">✅ Bueno</option>
                        <option value="Regular">⚠️ Regular</option>
                        <option value="Malo">❌ Malo</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Ubicación</label>
                <select name="ubicacion_id" class="form-select">
                    <option value="">Sin ubicación</option>
                    {% for u in ubicaciones %}
                    <option value="{{ u.id }}">
                        {{ '🏫' if u.tipo == 'salon' else '📦' }} {{ u.nombre }} ({{ u.tipo }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control" placeholder="Detalles adicionales del artículo..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Foto del artículo</label>
                <input type="file" name="foto" class="form-control" accept="image/*">
                <span style="font-size:12px;color:var(--text-3);margin-top:4px;display:block;">PNG, JPG, WEBP — máx. 16MB</span>
            </div>

            <div style="display:flex;gap:10px;margin-top:8px;">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i> Guardar artículo
                </button>
                <a href="{{ url_for('inventario.lista_articulos') }}" class="btn btn-ghost">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
